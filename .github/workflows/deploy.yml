name: Deploy to metacrystal.com

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USER }}@metacrystal.com <<'SFTP'
          -mkdir /home/nstrupp/metacrystal.com/groveminder
          put site-config.js /home/nstrupp/metacrystal.com/groveminder/site-config.js
          put index.html /home/nstrupp/metacrystal.com/groveminder/index.html
          put admin.html /home/nstrupp/metacrystal.com/groveminder/admin.html
          put ical-proxy.php /home/nstrupp/metacrystal.com/groveminder/ical-proxy.php
          put cal-push.php /home/nstrupp/metacrystal.com/groveminder/cal-push.php
          put mailer.php /home/nstrupp/metacrystal.com/groveminder/mailer.php
          SFTP

      - name: Confirm
        run: echo "✅ Deployed groveminder to metacrystal.com/groveminder/"
