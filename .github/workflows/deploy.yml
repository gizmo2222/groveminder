name: Deploy

on:
  push:
    branches: [main]

# Set the SFTP host and remote path for your site below.
env:
  SFTP_HOST: your-domain.com
  REMOTE_DIR: /home/${{ secrets.SFTP_USER }}/your-domain.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USER }}@${{ env.SFTP_HOST }} <<SFTP
          put site-config.js ${{ env.REMOTE_DIR }}/site-config.js
          put index.html ${{ env.REMOTE_DIR }}/index.html
          put admin.html ${{ env.REMOTE_DIR }}/admin.html
          put ical-proxy.php ${{ env.REMOTE_DIR }}/ical-proxy.php
          put cal-push.php ${{ env.REMOTE_DIR }}/cal-push.php
          put mailer.php ${{ env.REMOTE_DIR }}/mailer.php
          SFTP

      - name: Confirm
        run: echo "Deployed to ${{ env.SFTP_HOST }}"
